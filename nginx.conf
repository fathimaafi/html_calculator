server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html|css|js|ico|png|jpg|jpeg|gif|svg)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}

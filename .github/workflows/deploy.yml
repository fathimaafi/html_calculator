name: Deploy Simple Calculator to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout source code
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Step 2: Setup SSH key
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

    # Step 3: Ensure /var/www/html exists with correct permissions
    - name: Prepare Web Root
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          sudo mkdir -p /var/www/html
          sudo chown github-actions-deploy:github-actions-deploy /var/www/html
          sudo chmod 755 /var/www/html
          # Make index.html writable by github-actions-deploy before scp
          [ -f /var/www/html/index.html ] && sudo chown github-actions-deploy:github-actions-deploy /var/www/html/index.html || true

    # Step 4: Copy index.html directly to /var/www/html
    - name: Copy index.html to Web Root
      run: |
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          index.html \
          ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/var/www/html/index.html

    # Step 5: Copy Dockerfile and nginx.conf to /var/www/html for docker build
    - name: Copy Docker files to VM
      run: |
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          Dockerfile nginx.conf \
          ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/var/www/html/

    # Step 6: Build and run Docker container on first deploy, skip on subsequent pushes
    - name: Deploy Docker Container
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          # Force rebuild if nginx.conf changed
          NGINX_HASH=$(md5sum /var/www/html/nginx.conf | awk '{print $1}')
          STORED_HASH=$(cat /tmp/nginx_conf_hash 2>/dev/null || echo "")

          if ! sudo docker ps --format '{{.Names}}' | grep -q '^calculator$' || [ "$NGINX_HASH" != "$STORED_HASH" ]; then
            echo "Building and starting container..."

            sudo docker stop calculator || true
            sudo docker rm calculator || true
            sudo docker rmi calculator:latest || true

            cd /var/www/html
            sudo docker build -t calculator:latest .

            sudo docker run -d \
              --name calculator \
              --restart always \
              -p 8080:8080 \
              -v /var/www/html:/usr/share/nginx/html:ro \
              calculator:latest

            sudo docker image prune -f
            echo "$NGINX_HASH" > /tmp/nginx_conf_hash
          else
            echo "Container running - index.html updated via volume mount, no restart needed"
          fi

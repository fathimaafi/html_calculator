name: Deploy Simple Calculator to GCP VM

on:
  push:
    branches:
      - main  # Triggers when you push code to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull the HTML file from your repository into the workflow runner
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Step 2: Ensure the target directory exists on the VM and set permissions
    - name: Prepare VM Directories
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          sudo mkdir -p /var/www/html
          sudo chown -R ${{ secrets.VM_USER }}:www-data /var/www/html
          sudo chmod -R 755 /var/www/html

    # Step 3: Copy your index.html file directly over to the VM
    - name: Copy index.html to VM Web Directory
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        source: "index.html"
        target: "/tmp"
        overwrite: true

    # Step 4: Move file to web root and restart web server
    - name: Deploy and Restart Web Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          sudo mv /tmp/index.html /var/www/html/index.html
          sudo chown www-data:www-data /var/www/html/index.html
          sudo chmod 644 /var/www/html/index.html
          sudo systemctl restart nginx
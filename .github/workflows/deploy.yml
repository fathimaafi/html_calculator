name: Deploy Simple Calculator to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout source code
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Step 2: Copy files to VM
    - name: Copy Files to VM
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        source: "index.html,Dockerfile,nginx.conf"
        target: "/tmp/calculator"
        overwrite: true

    # Step 3: Deploy - builds container on first run, just updates file on subsequent pushes
    - name: Deploy to VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: 22
        script: |
          # Always update index.html in web root
          sudo mv /tmp/calculator/index.html /var/www/html/index.html
          sudo chown www-data:www-data /var/www/html/index.html
          sudo chmod 644 /var/www/html/index.html

          # Only build and start container if it's not already running
          if ! docker ps --format '{{.Names}}' | grep -q '^calculator$'; then
            echo "Container not running, building and starting..."

            # Stop VM's native nginx to free port 80
            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true

            cd /tmp/calculator
            docker build -t calculator:latest .

            docker run -d \
              --name calculator \
              --restart always \
              -p 80:80 \
              -v /var/www/html:/usr/share/nginx/html:ro \
              calculator:latest

            docker image prune -f
          else
            echo "Container already running, index.html updated - no restart needed"
          fi
